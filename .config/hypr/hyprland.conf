
# See https://wiki.hyprland.org/Configuring/Monitors/
monitorv2 {
    output = HDMI-A-1
    mode = 1920x1080@75
    position = 0x0
    scale = 1
    transform = 0
}

monitorv2 {
    output = HDMI-A-2
    mode = 1920x1080@144
    position = 1920x0
    scale = 1
    transform = 0
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
$scriptPath = ~/.config/hypr/scripts

exec-once = waybar
#exec-once = hypridle
exec-once = qbittorrent
exec-once = swww init && sleep 500 && $scriptPath/swww_randomize.sh ~/Pictures/wallpapers/rotation
exec-once = dunst
exec-once = systemctl --user start hyprpolkitagent

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

env = LIBVA_DRIVER_NAME,nvidia # https://wiki.hyprland.org/Nvidia/#environment-variables
env = XDG_SESSION_TYPE,wayland # https://wiki.hyprland.org/Nvidia/#environment-variables
env = GBM_BACKEND,nvidia-drm # https://wiki.hyprland.org/Nvidia/#environment-variables
env = __GLX_VENDOR_LIBRARY_NAME,nvidia # https://wiki.hyprland.org/Nvidia/#environment-variables

env = ELECTRON_OZONE_PLATFORM_HINT,auto # https://wiki.hyprland.org/Nvidia/#flickering-in-electron--cef-apps

env = XCURSOR_SIZE,24
env = WLR_RENDERER=vulkan

# Fix for empty "Open with..." context menu in Dolphin.
env = XDG_MENU_PREFIX,arch-

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
cursor {
    no_hardware_cursors = true
}

input {
    kb_layout = us,rs
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    touchpad {
        natural_scroll = no
    }

    follow_mouse = 2
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 2
    gaps_out = 4 # 15
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(020202aa) # rgba(595959aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 5
        passes = 3
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    #bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    #animation = windows, 1, 7, myBezier
    #animation = windowsOut, 1, 7, default, popin 80%
    #animation = border, 1, 10, default
    #animation = borderangle, 1, 8, default
    #animation = fade, 1, 7, default
    #animation = workspaces, 1, 6, default

    bezier = wind, 0.05, 0.9, 0.1, 1.0
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, once
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

misc {
    vrr = 0 # Controls the VRR (Adaptive Sync) of your monitors. 0 - off, 1 - on, 2 - fullscreen only
    focus_on_activate = on
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Window rules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
$activeOpacity = 0.98
$inactiveOpacity = 0.85

windowrule = float on, center on, match:title ^(Volume Control)$
windowrule = float on, center on, match:class ^(lutris)$
windowrule = workspace 1, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(discord)$
windowrule = workspace special:discord, match:class ^(discord)$
windowrule = workspace special:obs, match:class ^(.*obsproject.*)$
windowrule = dim_around on, match:class ^(org.pulseaudio.pavucontrol)$

# File/folder pickers
#windowrule = float, center, title:^(Open File|Open|Save|Save As|Export|Import|Choose File|Rename|Select Folder|Open Folder)$
windowrule = float on, center on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, center on, match:class ^(xdg-desktop-portal-hyprland)$
windowrule = float on, center on, match:class ^(Xdg-desktop-portal-gtk)$
windowrule = float on, center on, match:class ^(Xdg-desktop-portal-hyprland)$

# No screenshare
windowrule = no_screen_share on, match:class ^(.*qbittorrent.*)$

# Special workspaces
workspace = special:discord, gapsout:50
workspace = special:obs, gapsout:50, gapsin:50

# Smart gaps / no_gaps_when_only
#workspace = w[tv1], gapsout:0, gapsin:0
#workspace = f[1], gapsout:0, gapsin:0
#windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
#windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
#windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
#windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

windowrule = tile on, match:initial_title ^(Path of Building)$

#layerrule = blur, waybar
layerrule = blur on, match:namespace logout_dialog

layerrule {
    name = rofi
    match:namespace = rofi

    dim_around = on
    animation = popin 85%
}

layerrule {
    name = notifications
    match:namespace = notifications

    no_screen_share = on
}

# Sources
source = ~/.config/hypr/keybinds.conf

